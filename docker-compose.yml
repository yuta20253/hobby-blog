version: "3.8"

services:
  app:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "18080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: hobby_blog
      DB_PORT: 3306

  db:
    image: mysql:8.0
    container_name: hobby-blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: hobby_blog
    ports:
      - "13306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
